steps:
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-f", "deployment/Dockerfile", "-t", "${_IMAGE}", "."]
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_IMAGE}"]
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_IMAGE}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
substitutions:
  _IMAGE: "gcr.io/$PROJECT_ID/travel-planner-api"
  _SERVICE_NAME: "travel-planner-api"
  _REGION: "us-central1"
